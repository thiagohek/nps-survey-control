{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - NPS System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body style="padding-top: 0;">
    <div class="login-wrapper">
        <div class="card login-card">
            <div class="login-logo">
                <div class="logo-icon-lg">
                    <i class="bi bi-bar-chart-fill"></i>
                </div>
                <h3>NPS System</h3>
                <p>Acesse sua conta para continuar</p>
            </div>

            <div class="card-body px-4 pb-4 pt-0">
                {% if form.errors %}
                <div class="alert alert-danger d-flex align-items-center" role="alert">
                    <i class="bi bi-exclamation-triangle-fill me-2"></i>
                    <span>Credenciais incorretas. Tente novamente.</span>
                </div>
                {% endif %}

                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="id_username" class="form-label">
                            <i class="bi bi-envelope me-1"></i>Email
                        </label>
                        <input type="email" name="username" class="form-control form-control-lg"
                               id="id_username" placeholder="Digite seu email" autofocus required>
                    </div>
                    <div class="mb-4">
                        <label for="id_password" class="form-label">
                            <i class="bi bi-lock me-1"></i>Senha
                        </label>
                        <input type="password" name="password" class="form-control form-control-lg"
                               id="id_password" placeholder="Digite sua senha" required>
                    </div>
                    <button type="submit" class="btn btn-brand btn-lg w-100">
                        <i class="bi bi-box-arrow-in-right me-2"></i>Entrar
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
